spring.application.name=demo-exam-spring-backend

server.port=8082

app.title=Book Store Demo Template
app.company-name=Book Store
app.storage-root=storage
app.database-file=book_store_exam.db

spring.datasource.url=jdbc:sqlite:${app.storage-root}/database/${app.database-file}?foreign_keys=on
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

springdoc.api-docs.path=/api/v3/api-docs
springdoc.swagger-ui.path=/api/v3/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.persistAuthorization=true
springdoc.swagger-ui.display-request-duration=true
